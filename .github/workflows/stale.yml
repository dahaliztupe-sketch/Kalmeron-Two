name: Close Stale Issues & PRs

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,roadmap"
          exempt-pr-labels: "pinned,security,wip"
          stale-issue-message: |
            This issue has been inactive for 60 days. It will be closed in 14 days
            unless there is new activity. Comment to keep it open.
          stale-pr-message: |
            This pull request has been inactive for 30 days. It will be closed in
            14 days unless there is new activity.
          close-issue-message: "Closing as stale. Please reopen if still relevant."
          close-pr-message: "Closing as stale. Please reopen if you wish to continue work."
          operations-per-run: 100
