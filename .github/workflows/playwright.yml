name: Playwright E2E

on:
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "src/**"
      - "e2e/**"
      - "playwright.config.ts"
      - "package.json"
      - "package-lock.json"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Run end-to-end tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: "npm"
      - name: Configure npm retries
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-timeout 600000
      - run: npm ci --no-audit --no-fund
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build Next.js app
        run: npm run build
        env:
          CI: "true"
          NEXT_TELEMETRY_DISABLED: "1"
          NODE_OPTIONS: "--max-old-space-size=4096"
          MOCK_AUTH: "true"
          MOCK_LLM: "true"
          NEXT_PUBLIC_MOCK_AUTH: "true"
          # Firebase placeholders so any module that reads them at build time
          # doesn't throw `auth/invalid-api-key`. Mock-auth is the real switch
          # that disables Firebase calls — these are belt-and-braces.
          NEXT_PUBLIC_FIREBASE_API_KEY: "ci-dummy-key"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "example.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "ci-example"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "example.appspot.com"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:0:web:0"
          GEMINI_API_KEY: "ci-mock"
      - name: Run tests
        run: npm run test:e2e
        env:
          CI: "true"
          NEXT_TELEMETRY_DISABLED: "1"
          PORT: "5000"
          MOCK_AUTH: "true"
          MOCK_LLM: "true"
          NEXT_PUBLIC_MOCK_AUTH: "true"
          NEXT_PUBLIC_FIREBASE_API_KEY: "ci-dummy-key"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "example.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "ci-example"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "example.appspot.com"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:0:web:0"
          GEMINI_API_KEY: "ci-mock"
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
