name: Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# S008 — Least-privilege permissions: ESLint only needs code read access.
permissions:
  contents: read

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (zero warnings gate)
        run: npx eslint . --max-warnings=0
