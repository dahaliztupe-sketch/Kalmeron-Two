name: AI Eval Gate

on:
  pull_request:
    paths:
      - 'src/ai/agents/**'
      - 'src/lib/security/**'
      - 'src/lib/llm/**'
      - 'src/lib/compliance/**'
      - 'src/ai/orchestrator/**'
      - 'test/eval/**'
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Run AI eval suite
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run eval
