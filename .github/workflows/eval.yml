name: AI Eval Gate

on:
  pull_request:
    paths:
      - 'src/ai/agents/**'
      - 'src/lib/security/**'
      - 'src/lib/llm/**'
      - 'src/lib/compliance/**'
      - 'src/ai/orchestrator/**'
      - 'test/eval/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Run AI eval suite
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EVAL_MIN_PASS_RATE: '0.80'
        run: |
          npm run eval | tee eval-output.txt
          # Extract overall pass-rate from eval output and fail if below threshold.
          # The harness prints a final line `Overall pass rate: 0.XX`.
          rate=$(grep -oE 'Overall pass rate:[[:space:]]*[0-9.]+' eval-output.txt | tail -1 | grep -oE '[0-9.]+$' || echo "0")
          echo "Detected overall pass rate: $rate (threshold $EVAL_MIN_PASS_RATE)"
          awk -v r="$rate" -v t="$EVAL_MIN_PASS_RATE" 'BEGIN { exit (r+0 >= t+0) ? 0 : 1 }' || {
            echo "::error::AI eval pass-rate $rate is below required $EVAL_MIN_PASS_RATE — failing PR."
            exit 1
          }

      - name: Upload eval output
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: eval-output
          path: eval-output.txt
