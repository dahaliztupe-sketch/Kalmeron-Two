name: Semgrep SAST

# Free static analysis covering JS/TS/Python/secrets/OWASP rules.
# Complements CodeQL — no Semgrep account or token required when
# running the OSS CLI directly against curated rule packs.
#
# Results are uploaded to GitHub Security tab (SARIF) for review.
# The step is non-blocking (continue-on-error: true) so that Semgrep
# findings surface in the Security tab without blocking merges; all
# critical remediation is tracked via GitHub Security Alerts.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep:latest
    if: (github.actor != 'dependabot[bot]')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run Semgrep
        # --no-error: exit 0 even when findings exist so CI is not blocked.
        # Findings are still captured in semgrep.sarif and uploaded to the
        # GitHub Security tab for developer review and triage.
        run: |
          semgrep scan \
            --config p/ci \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/javascript \
            --config p/typescript \
            --config p/react \
            --config p/nextjs \
            --config p/python \
            --config p/secrets \
            --sarif --output=semgrep.sarif \
            --no-error
      - uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep
