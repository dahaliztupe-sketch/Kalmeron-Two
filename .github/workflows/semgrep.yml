name: Semgrep SAST

# Free static analysis covering JS/TS/Python/secrets/OWASP rules.
# Complements CodeQL — no Semgrep account or token required when
# running the OSS CLI directly against curated rule packs.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    if: (github.actor != 'dependabot[bot]')
    steps:
      - uses: actions/checkout@v6
      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/ci \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/javascript \
            --config p/typescript \
            --config p/react \
            --config p/nextjs \
            --config p/python \
            --config p/secrets \
            --sarif --output=semgrep.sarif \
            --error
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep
