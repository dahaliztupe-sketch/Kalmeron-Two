name: Lockfile Lint

# Defends against supply-chain attacks via package-lock.json
# tampering: enforces https resolved URLs, integrity hashes, and
# the official npm registry. Runs only when the lockfile changes.

on:
  pull_request:
    paths:
      - "package-lock.json"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Validate package-lock.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
      - name: Run lockfile-lint
        run: |
          npx --yes lockfile-lint@^4 \
            --path package-lock.json \
            --type npm \
            --validate-https \
            --validate-integrity \
            --allowed-hosts npm \
            --allowed-schemes "https:"
