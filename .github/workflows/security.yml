name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  audit:
    name: npm audit (production deps)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --ignore-scripts
      - name: Audit production dependencies (fail on high or critical, with allowlist)
        # The `xlsx` package ships two high-severity advisories
        # (GHSA-4r6h-8v6p-xvw6, GHSA-5pgg-2g8v-p4x9) with no fix on npm —
        # the upstream fix lives only on the SheetJS CDN. We allowlist
        # those specific advisory IDs so CI fails on any *new* high/critical
        # issue but does not block on the known-no-fix xlsx ones.
        run: |
          npm audit --omit=dev --json > audit-report.json || true
          node scripts/check-audit.mjs audit-report.json
      - name: Generate full audit report (informational)
        if: always()
        run: npm audit --json > audit-report-full.json || true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: npm-audit-report
          path: |
            audit-report.json
            audit-report-full.json
          retention-days: 30

  codeql:
    name: CodeQL (JavaScript/TypeScript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v4

  secret-scan:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lexicon-strict:
    # P2-5: enforce the brand lexicon in CI.
    # Fails the build if user-facing strings violate `scripts/lexicon-lint.ts` rules
    # (trademark casing, banned phrases, locale mix-ups).
    name: Lexicon (Arabic style guide)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --ignore-scripts
      - name: Run lexicon lint (strict)
        run: npm run lint:lexicon
