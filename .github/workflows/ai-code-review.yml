name: AI Code Review

# Lightweight PR quality gate. The previous CodeRabbit-style action
# was removed because it required external infrastructure that is not
# guaranteed to be available in this repo. This workflow now does the
# things we can verify deterministically on every PR:
#   1. TypeScript type-check (next-aware)
#   2. ESLint
#   3. Lexicon (Arabic style guide) lint
# Together they catch the bulk of regressions an AI reviewer would flag.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  review:
    name: PR quality gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install
        run: npm ci --no-audit --no-fund --ignore-scripts
      - name: Lint
        run: npm run lint
      - name: Lexicon (Arabic style guide)
        run: npm run lint:lexicon
