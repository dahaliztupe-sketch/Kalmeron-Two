name: Trivy Filesystem Scan

# Aqua Security's Trivy scans the repo for vulnerable dependencies,
# misconfigured Dockerfiles / IaC, and exposed secrets. Open-source,
# no account or token required. Results land in GitHub Security.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "15 5 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Filesystem + config + secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          scanners: "vuln,misconfig,secret"
      - uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy
