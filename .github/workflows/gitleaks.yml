name: Gitleaks Secret Scan

# Scans the repo (and PR diffs) for committed secrets — API keys,
# tokens, private keys, etc. Free for public repos and personal
# accounts; no token required for that tier.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 2"

permissions:
  contents: read

jobs:
  scan:
    name: Find leaked secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
