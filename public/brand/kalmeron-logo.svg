<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" fill="none" role="img" aria-label="Kalmeron AI">
  <defs>
    <linearGradient id="kl-top" x1="20%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="45%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="kl-bot" x1="10%" y1="90%" x2="90%" y2="10%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="55%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#E879F9"/>
    </linearGradient>
    <linearGradient id="kl-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="kl-ai" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#C026D3"/>
    </linearGradient>
    <radialGradient id="kl-spark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#BAE6FD" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="kl-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── ICON ── -->
  <g transform="translate(0,0)">
    <circle cx="60" cy="60" r="54" fill="url(#kl-halo)"/>
    <path d="M 92 56 L 92 82 Q 92 92 82 92 L 46 92 Q 36 92 36 82 L 36 64"
          stroke="url(#kl-bot)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 92 60 L 92 80 Q 92 88 84 88 L 50 88"
          stroke="#ffffff" stroke-opacity="0.18" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <path d="M 28 64 L 28 38 Q 28 28 38 28 L 74 28 Q 84 28 84 38 L 84 56"
          stroke="url(#kl-top)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 28 60 L 28 40 Q 28 32 36 32 L 70 32"
          stroke="#ffffff" stroke-opacity="0.28" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <circle cx="60" cy="60" r="14" fill="url(#kl-spark)"/>
    <circle cx="60" cy="60" r="3.4" fill="#ffffff"/>
  </g>

  <!-- ── WORDMARK ── -->
  <g transform="translate(132, 50)">
    <text x="0" y="0" font-family="'Syne','Inter','Segoe UI',sans-serif"
          font-weight="800" font-size="34" letter-spacing="1.5"
          fill="url(#kl-text)">KALMERON</text>
    <text x="0" y="28" font-family="'Inter','Segoe UI',sans-serif"
          font-weight="700" font-size="14" letter-spacing="6"
          fill="url(#kl-ai)">AI · STUDIO</text>
  </g>
</svg>
