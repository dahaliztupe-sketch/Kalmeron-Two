<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" role="img" aria-label="Kalmeron AI">
  <defs>
    <linearGradient id="km-top" x1="20%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="45%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="km-bot" x1="10%" y1="90%" x2="90%" y2="10%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="55%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#E879F9"/>
    </linearGradient>
    <radialGradient id="km-spark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#BAE6FD" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="km-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>
    <filter id="km-blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
  </defs>

  <!-- soft halo behind -->
  <circle cx="60" cy="60" r="54" fill="url(#km-halo)"/>

  <!-- BACK hook (bottom-right, fuchsia→indigo): squared C opening up-left -->
  <path
    d="M 92 56 L 92 82 Q 92 92 82 92 L 46 92 Q 36 92 36 82 L 36 64"
    stroke="url(#km-bot)"
    stroke-width="11"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- subtle inner highlight on back hook -->
  <path
    d="M 92 60 L 92 80 Q 92 88 84 88 L 50 88"
    stroke="#ffffff"
    stroke-opacity="0.18"
    stroke-width="2.2"
    stroke-linecap="round"
    fill="none"
  />

  <!-- FRONT hook (top-left, cyan→indigo): squared C opening down-right -->
  <path
    d="M 28 64 L 28 38 Q 28 28 38 28 L 74 28 Q 84 28 84 38 L 84 56"
    stroke="url(#km-top)"
    stroke-width="11"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- subtle inner highlight on front hook -->
  <path
    d="M 28 60 L 28 40 Q 28 32 36 32 L 70 32"
    stroke="#ffffff"
    stroke-opacity="0.28"
    stroke-width="2.2"
    stroke-linecap="round"
    fill="none"
  />

  <!-- center glow disc -->
  <circle cx="60" cy="60" r="14" fill="url(#km-spark)" filter="url(#km-blur)"/>
  <!-- bright spark dot -->
  <circle cx="60" cy="60" r="3.4" fill="#ffffff"/>
  <circle cx="60" cy="60" r="1.4" fill="#E0F2FE"/>
</svg>
